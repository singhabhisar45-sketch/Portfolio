name: tdsemployer
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.4

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  device_info_plus: ^11.2.1
  shared_preferences: ^2.3.5
  http: ^1.2.2
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  flutter_local_notifications: ^18.0.1
  dio: ^5.7.0
  open_filex: ^4.5.0
  package_info_plus: ^8.2.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  record: ^6.0.0
  audioplayers: ^6.1.0
  video_player: ^2.8.1
  chewie: ^1.7.1
  intl : ^0.20.2
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/door.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/door.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/door.png
